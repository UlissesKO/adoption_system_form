{% extends "base.html" %}
{% block title %}Login — Toca dos Peludos{% endblock %}

{% block content %}
<section class="form-section">
    <div class="content-box">
        <h2>Logar Conta</h2>

        {% if erro %}<div class="alert-error">{{ erro }}</div>{% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-row">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-row">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required>
            </div>
            <button type="submit" class="btn">Acessar Conta</button>
        </form>

        <div style="text-align:center; margin-top:25px; padding-top:20px; border-top:1px solid #e8dcc4;">
            <p style="margin-bottom:12px; font-size:14px;">
                Não possui cadastro? Junte-se a nós ou entre em contato conosco!
            </p>
            <a href="{{ url_for('cadastro') }}" class="btn btn-outline">Criar Cadastro</a>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% endblock %}
